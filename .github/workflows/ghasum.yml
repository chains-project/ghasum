name: ghasum
on:
  push:
    branches:
    - dependabot/github_actions/**

permissions: read-all

jobs:
  update:
    name: Update gha.sum
    runs-on: ubuntu-24.04
    if: github.actor == 'dependabot[bot]'
    steps:
    - name: Create automation token
      uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
      id: automation-token
      with:
        app-id: ${{ secrets.AUTOMATION_APP_ID }}
        private-key: ${{ secrets.AUTOMATION_APP_KEY }}
        permission-contents: write # To push a commit
    - name: Checkout repository
      uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      with:
        token: ${{ steps.automation-token.outputs.token }}
        persist-credentials: false
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
    # NOTE: skip "Verify action checksums" because they might not be up-to-date
    - name: Update gha.sum
      run: go run ./cmd/ghasum update -force
    - name: Configure git
      env:
        APP_SLUG: ${{ steps.automation-token.outputs.app-slug }}
        GH_TOKEN: ${{ steps.automation-token.outputs.token }}
      run: |
        USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)

        git config --global user.name "${APP_SLUG}[bot]"
        git config --global user.email "${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

        gh auth setup-git
    - name: Commit and push gha.sum
      env:
        GH_TOKEN: ${{ steps.automation-token.outputs.token }}
      run: |
        git add '.github/workflows/gha.sum'
        git commit --amend --no-edit --trailer "Co-authored-by: $(git config user.name) <$(git config user.email)>"
        git push --force
