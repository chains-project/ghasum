name: Publish
on:
  push:
    tags:
    - v[0-9]+.[0-9]+.[0-9]+

permissions: read-all

jobs:
  github-release:
    name: GitHub Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write # To create a GitHub Release
    steps:
    - name: Checkout repository
      uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      with:
        persist-credentials: false
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        cache: false
        go-version-file: go.mod
    - name: Verify action checksums
      env:
        JOB: ${{ github.job }}
        WORKFLOW: ${{ github.workflow_ref }}
      run: |
        WORKFLOW=$(echo "$WORKFLOW" | cut -d '@' -f 1 | cut -d '/' -f 3-5)
        go run ./cmd/ghasum verify -cache /home/runner/work/_actions -no-evict -offline "$WORKFLOW:$JOB"
    - name: Get release version
      id: version
      shell: bash
      run: |
        value=${GITHUB_REF#refs/tags/}
        echo "value=${value}" >>"${GITHUB_OUTPUT}"
    - name: Get release notes
      id: notes
      shell: bash
      env:
        VERSION: ${{ steps.version.outputs.value }}
      run: |
        value=$(awk "/^## \[$VERSION\]/{f=1;next} f && /^## \[/{exit} f" CHANGELOG.md)
        echo "value=${value}" >>"${GITHUB_OUTPUT}"
    - name: Compile
      run: go run tasks.go build-all
    - name: Create GitHub release
      shell: bash
      env:
        GH_TOKEN: ${{ steps.automation-token.outputs.token }}
        NOTES: ${{ steps.notes.outputs.value }}
        VERSION: ${{ steps.version.outputs.value }}
      run: |
        gh release create "${VERSION}" ./_compiled/* \
          --title "Release ${VERSION}" \
          --notes "${NOTES}" \
          --latest=true
